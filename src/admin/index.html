<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연상 체인 릴레이 — 진행자 콘솔</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 24px; }
    h1 { font-size: 1.6rem; margin-bottom: 16px; }
    h2 { font-size: 1.2rem; margin: 16px 0 8px; color: #a5b4fc; }
    .container { max-width: 600px; margin: 0 auto; }
    button { padding: 12px 20px; border-radius: 8px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; margin: 4px; }
    .btn-primary { background: #e94560; color: white; }
    .btn-secondary { background: #334155; color: white; }
    .btn-danger { background: #dc2626; color: white; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .card { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .status { font-size: 1.1rem; color: #4ade80; margin-bottom: 8px; }
    input { padding: 8px 12px; border-radius: 6px; border: 1px solid #444; background: #0f0f23; color: #eee; font-size: 1rem; width: 45%; margin-right: 4px; }
    .question-list { list-style: none; }
    .question-list li { padding: 6px 0; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .preview { background: #334155; border-radius: 8px; padding: 12px; margin: 8px 0; }
    .log { background: #0f0f23; border-radius: 8px; padding: 12px; max-height: 200px; overflow-y: auto; font-size: 0.85rem; color: #888; margin-top: 12px; }
    .teams-view { margin-top: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .team-box { background: #0f0f23; border: 1px solid #334155; border-radius: 8px; padding: 10px 12px; }
    .team-box h3 { font-size: 1rem; color: #4ade80; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: baseline; }
    .team-box .cnt { font-size: 0.8rem; color: #888; font-weight: normal; }
    .team-box ol { margin: 0; padding-left: 18px; }
    .team-box li { padding: 2px 0; font-size: 0.95rem; }
    .team-box li.left { color: #ef4444; text-decoration: line-through; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 진행자 콘솔</h1>

    <div class="card">
      <p class="status" id="status">대기 중 (lobby)</p>
      <p id="player-count">접속 인원: 0명</p>
    </div>

    <div class="card">
      <h2>팀 배정</h2>
      <button class="btn-primary" id="btn-assign">팀 배정</button>
      <button class="btn-danger" id="btn-reset">초기화</button>
    </div>

    <div class="card">
      <h2>팀 명단 <span id="teams-summary" style="font-size:0.9rem;color:#888;font-weight:normal;"></span></h2>
      <button class="btn-secondary" id="btn-teams">명단 새로고침</button>
      <div class="teams-view" id="teams-view">
        <p style="color:#888;font-size:0.9rem;">팀 배정 후 팀원 명단이 여기에 표시됩니다.</p>
      </div>
    </div>

    <div class="card">
      <h2>라운드 제어</h2>
      <button class="btn-primary" id="btn-start-round">라운드 시작</button>
      <button class="btn-danger" id="btn-end-round">강제 종료</button>
      <button class="btn-secondary" id="btn-show-chain">체인 보기</button>
      <button class="btn-secondary" id="btn-show-score">스코어보드</button>
      <button class="btn-primary" id="btn-final" style="background:#f59e0b;">🏆 최종 결과</button>

      <div class="preview" id="preview">
        <p>다음 문제를 확인하려면 라운드 시작 전 "미리보기"를 누르세요</p>
      </div>
      <button class="btn-secondary" id="btn-preview">문제 미리보기</button>
      <button class="btn-secondary" id="btn-replace">다른 문제로</button>
    </div>

    <div class="card">
      <h2>수동 문제 추가</h2>
      <div>
        <input id="input-start" placeholder="출발어" />
        <input id="input-target" placeholder="목표어" />
        <button class="btn-secondary" id="btn-add-q">추가</button>
      </div>
      <ul class="question-list" id="manual-list"></ul>
    </div>

    <div class="log" id="log"></div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
